<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toronto Live Music Finder</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.0/css/dataTables.dataTables.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; }
        h1 { color: #ff3b3b; text-align: center; margin-bottom: 30px; }
        
        /* Filter Panel Styling */
        .filter-panel { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border: 1px solid #333;
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; font-size: 0.9em; color: #aaa; }
        input, select { 
            padding: 8px; 
            background: #2a2a2a; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 4px; 
        }

        /* Adjust Select2 for Dark Mode */
        .select2-container--default .select2-selection--multiple { background-color: #2a2a2a; border: 1px solid #444; }
        .select2-container--default .select2-selection--multiple .select2-selection__choice { background-color: #ff3b3b; border: none; color: white; }
        .select2-dropdown { background-color: #2a2a2a; color: white; }

        .dt-container { background: #1e1e1e; padding: 20px; border-radius: 8px; }
        a { color: #4db8ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Toronto Concert Finder</h1>

        <div class="filter-panel">
            <div class="filter-group">
                <label>Start Date</label>
                <input type="date" id="min-date">
            </div>
            <div class="filter-group">
                <label>End Date</label>
                <input type="date" id="max-date">
            </div>
            <div class="filter-group">
                <label>Venues (Multi-select)</label>
                <select id="venue-filter" multiple="multiple" style="width: 100%"></select>
            </div>
            <div class="filter-group">
                <label>Age (Multi-select)</label>
                <select id="age-filter" multiple="multiple" style="width: 100%"></select>
            </div>
            <div class="filter-group">
                <label>Max Price ($)</label>
                <input type="number" id="price-max" placeholder="e.g. 50">
            </div>
        </div>

        <div class="dt-container">
            <table id="concerts" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Artist</th>
                        <th>Venue</th>
                        <th>Price</th>
                        <th>Age</th>
                        <th>Sample</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.datatables.net/2.0.0/js/dataTables.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function() {
            // Initialize Table
            var table = $('#concerts').DataTable({
                ajax: { url: 'concerts.json', dataSrc: '' },
                columns: [
                    { data: 'date' },
                    { 
                        data: 'artist',
                        render: function(data, type, row) {
                            // This turns the Artist text into a clickable link using the 'url' from your JSON
                            return `<a href="${row.url}" target="_blank">${data}</a>`;
                        }
                    },
                    { data: 'venue' },
                    { data: 'price' },
                    { data: 'age' },
                    { 
                        data: 'youtube_sample',
                        render: function(data, type, row) {
                            return `<a href="${data}" target="_blank">Listen</a>`;
                        }
                    }
                ],
                order: [[0, 'asc']],
                pageLength: 50,
                initComplete: function(settings, json) {
                    // Populate Venue and Age filters dynamically from the data
                    var venues = [...new Set(json.map(item => item.venue))].sort();
                    var ages = [...new Set(json.map(item => item.age))].sort();
                    
                    venues.forEach(v => $('#venue-filter').append(new Option(v, v)));
                    ages.forEach(a => $('#age-filter').append(new Option(a, a)));
                    
                    $('#venue-filter, #age-filter').select2({ placeholder: "All selected" });
                }
            });

            // CUSTOM FILTERING LOGIC
            $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
                var minD = $('#min-date').val();
                var maxD = $('#max-date').val();
                var rowDate = data[0]; // Date column

                var selectedVenues = $('#venue-filter').val();
                var rowVenue = data[2];

                var selectedAges = $('#age-filter').val();
                var rowAge = data[4];

                var maxP = parseFloat($('#price-max').val());
                // Clean price: removes '$', '+', and commas for comparison
                var rowPrice = parseFloat(data[3].replace(/[$,+]/g, '')) || 0;

                // Date Filter
                if (minD && rowDate < minD) return false;
                if (maxD && rowDate > maxD) return false;

                // Venue Filter
                if (selectedVenues && selectedVenues.length > 0 && !selectedVenues.includes(rowVenue)) return false;

                // Age Filter
                if (selectedAges && selectedAges.length > 0 && !selectedAges.includes(rowAge)) return false;

                // Price Filter
                if (!isNaN(maxP) && rowPrice > maxP) return false;

                return true;
            });

            // Redraw table on any input change
            $('#min-date, #max-date, #venue-filter, #age-filter, #price-max').on('change keyup', function() {
                table.draw();
            });
        });
    </script>
</body>
</html>
