<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toronto Live Music Finder</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.0/css/dataTables.dataTables.css">
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #ff3b3b; border-bottom: 2px solid #333; padding-bottom: 10px; }
        a { color: #4db8ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .dt-container { background: #1e1e1e; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Toronto Live Music: 365-Day Outlook</h1>
        <div class="dt-container">
            <table id="concerts" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Artist</th>
                        <th>Venue</th>
                        <th>Price</th>
                        <th>Age</th>
                        <th>YouTube Sample</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.datatables.net/2.0.0/js/dataTables.js"></script>
    <script>
        $(document).ready(function() {
            $('#concerts').DataTable({
                ajax: { url: 'concerts.json', dataSrc: '' },
                columns: [
                    { data: 'date' },
                    { data: 'artist' },
                    { data: 'venue' },
                    { data: 'price' },
                    { data: 'age' },
                    { 
                        data: 'youtube_sample',
                        render: function(data, type, row) {
                            return `<a href="${data}" target="_blank">See ${row.artist} playing live</a>`;
                        }
                    }
                ],
                order: [[0, 'asc']],
                pageLength: 50
            });
        });
    </script>
</body>
</html>
